<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROBOLAB — Acceso al Sistema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #00f5ff;
      --cyan-dim: #00c8d4;
      --green: #00ff88;
      --orange: #ff6b2b;
      --red: #ff2d55;
      --bg-deep: #050a0f;
      --bg-card: #0a1628;
      --bg-panel: #0d1f35;
      --border: #1a3a5c;
      --text-muted: #4a7fa5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg-deep);
      color: #e0f0ff;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Grid de fondo animado ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-shift 20s linear infinite;
    }
    @keyframes grid-shift {
      0% { transform: perspective(500px) rotateX(10deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(10deg) translateY(60px); }
    }

    /* ── Partículas flotantes ── */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--cyan);
      border-radius: 50%;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
    }

    /* ── Scanline ── */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scan 4s linear infinite;
      opacity: 0.3;
    }
    @keyframes scan {
      0% { top: -5px; }
      100% { top: 100vh; }
    }

    /* ── Card principal ── */
    .login-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2.5rem 2rem;
      width: 420px;
      max-width: 95vw;
      box-shadow:
        0 0 0 1px rgba(0, 245, 255, 0.1),
        0 0 40px rgba(0, 245, 255, 0.05),
        inset 0 1px 0 rgba(0, 245, 255, 0.1);
      animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes card-in {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Bordes decorativos de esquina */
    .login-card::before,
    .login-card::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .login-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .login-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ── Logo / Título ── */
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
      line-height: 1;
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.25em;
      margin-top: 4px;
    }

    /* ── Robot SVG animado ── */
    .robot-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }
    .robot-eye {
      animation: blink 3s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* ── Separador ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.25rem 0;
    }

    /* ── Inputs ── */
    .input-group { position: relative; margin-bottom: 1rem; }

    .input-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .cyber-input {
      width: 100%;
      background: rgba(0, 245, 255, 0.03);
      border: 1px solid var(--border);
      color: #e0f0ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      padding: 0.65rem 0.85rem 0.65rem 2.5rem;
      border-radius: 2px;
      outline: none;
      transition: all 0.2s;
    }
    .cyber-input:focus {
      border-color: var(--cyan);
      background: rgba(0, 245, 255, 0.06);
      box-shadow: 0 0 0 1px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.03);
    }
    .cyber-input::placeholder { color: var(--text-muted); }

    .input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .input-group:has(.cyber-input:focus) .input-icon { color: var(--cyan); }

    /* ── Botón principal ── */
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-101%);
      transition: transform 0.3s ease;
      z-index: 0;
    }
    .btn-login:hover::before { transform: translateX(0); }
    .btn-login:hover { color: var(--bg-deep); }
    .btn-login span { position: relative; z-index: 1; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      background: rgba(255, 45, 85, 0.1);
      border: 1px solid rgba(255, 45, 85, 0.4);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      padding: 0.6rem 0.85rem;
      border-radius: 2px;
      margin-top: 0.75rem;
      display: none;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ── Status bar ── */
    .status-bar {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
      50% { box-shadow: 0 0 0 4px rgba(0, 255, 136, 0); }
    }

    /* ── Loading spinner ── */
    .loading { display: none; }
    .loading.active { display: inline-block; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0, 245, 255, 0.3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Fondo -->
  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <!-- Partículas -->
  <div class="particle" style="left:10%;animation-duration:8s;animation-delay:0s;"></div>
  <div class="particle" style="left:25%;animation-duration:12s;animation-delay:2s;width:3px;height:3px;"></div>
  <div class="particle" style="left:50%;animation-duration:9s;animation-delay:4s;"></div>
  <div class="particle" style="left:70%;animation-duration:11s;animation-delay:1s;background:var(--green);"></div>
  <div class="particle" style="left:85%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="particle" style="left:40%;animation-duration:14s;animation-delay:6s;background:var(--orange);"></div>

  <!-- Card de login -->
  <div class="login-card">

    <!-- Header con logo -->
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
      <!-- Robot SVG -->
      <svg class="robot-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="16" width="24" height="20" rx="3" fill="#0a1628" stroke="#00f5ff" stroke-width="1.5"/>
        <rect x="20" y="22" width="5" height="5" rx="1" fill="#00f5ff" class="robot-eye"/>
        <rect x="27" y="22" width="5" height="5" rx="1" fill="#00f5ff" class="robot-eye" style="animation-delay:0.1s"/>
        <rect x="21" y="30" width="10" height="2" rx="1" fill="#00f5ff" opacity="0.6"/>
        <rect x="22" y="10" width="8" height="6" rx="2" fill="#0a1628" stroke="#00f5ff" stroke-width="1.5"/>
        <circle cx="26" cy="10" r="1.5" fill="#00ff88"/>
        <rect x="7" y="20" width="7" height="3" rx="1.5" fill="#1a3a5c" stroke="#00f5ff" stroke-width="1"/>
        <rect x="38" y="20" width="7" height="3" rx="1.5" fill="#1a3a5c" stroke="#00f5ff" stroke-width="1"/>
        <rect x="19" y="36" width="6" height="8" rx="1" fill="#1a3a5c" stroke="#00f5ff" stroke-width="1"/>
        <rect x="27" y="36" width="6" height="8" rx="1" fill="#1a3a5c" stroke="#00f5ff" stroke-width="1"/>
      </svg>

      <div>
        <div class="logo-text">ROBOLAB</div>
        <div class="logo-sub">SISTEMA DE GAMIFICACIÓN v2.0</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Formulario -->
    <div style="margin-bottom:0.25rem;">
      <p style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-muted);letter-spacing:0.15em;margin-bottom:1.25rem;">
        // IDENTIFICACIÓN DE USUARIO
      </p>

      <div class="input-group">
        <label class="input-label">Usuario</label>
        <div style="position:relative;">
          <span class="input-icon">▸</span>
          <input type="text" id="inp-usuario" class="cyber-input" placeholder="ingresa tu usuario" autocomplete="username" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Contraseña</label>
        <div style="position:relative;">
          <span class="input-icon">🔒</span>
          <input type="password" id="inp-password" class="cyber-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <button class="btn-login" id="btn-login" onclick="handleLogin()">
        <span>
          <span class="loading" id="spinner"><span class="spinner"></span></span>
          INICIAR SESIÓN
        </span>
      </button>

      <div class="error-msg" id="error-msg">
        ⚠ ERROR: <span id="error-text">Credenciales inválidas</span>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span><span class="status-dot"></span>SISTEMA ONLINE</span>
      <span id="clock-display" style="color:#2a5a7a;">--:--:--</span>
      <span>TALLER DE ROBÓTICA</span>
    </div>

  </div>

  <script>
    // ── Reloj en tiempo real ──────────────────────────────────
    function updateClock() {
      const now = new Date();
      const t = now.toTimeString().slice(0, 8);
      document.getElementById('clock-display').textContent = t;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Enter key para login ──────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // ── Función de login ──────────────────────────────────────
    async function handleLogin() {
      const usuario = document.getElementById('inp-usuario').value.trim();
      const password = document.getElementById('inp-password').value;
      const btn = document.getElementById('btn-login');
      const errDiv = document.getElementById('error-msg');
      const spinner = document.getElementById('spinner');

      if (!usuario || !password) {
        showError('Debes completar ambos campos');
        return;
      }

      // Mostrar estado de carga
      btn.disabled = true;
      spinner.classList.add('active');
      errDiv.style.display = 'none';

      try {
        // POST al endpoint de login del servidor
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password })
        });
        const data = await res.json();

        if (data.success) {
          // Redirige según el rol devuelto por el servidor
          window.location.href = data.rol === 'admin' ? '/admin' : '/alumno';
        } else {
          showError(data.error || 'Credenciales inválidas');
        }
      } catch (err) {
        showError('Error de conexión con el servidor');
      } finally {
        btn.disabled = false;
        spinner.classList.remove('active');
      }
    }

    function showError(msg) {
      const errDiv = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      errDiv.style.display = 'block';
      errDiv.style.animation = 'none';
      setTimeout(() => errDiv.style.animation = '', 10);
    }
  </script>
</body>
</html>
